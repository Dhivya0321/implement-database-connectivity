<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Connectivity Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        #result {
            margin-top: 20px;
            font-size: 18px;
            color: green;
        }
    </style>
</head>
<body>

    <h1>Database Connectivity Demo</h1>

    <button onclick="connectDatabase()">Connect Database</button>

    <div id="result">Click the button to fetch data.</div>

    <script>
        function connectDatabase() {
            fetch("http://localhost:3000/users")
                .then(response => response.json())
                .then(data => {
                    document.getElementById("result").innerHTML =
                        "Database Connected Successfully!<br><br>" +
                        JSON.stringify(data, null, 2);
                })
                .catch(error => {
                    document.getElementById("result").innerHTML =
                        "Database Connection Failed!";
                    console.error(error);
                });
        }
    </script>

</body>
</html>
